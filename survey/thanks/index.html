<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>arch arch | Thank you</title>
    <link rel="icon" href="../../assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="../survey.css">
    <style>
        .thanks {
            margin: 0 0 0 var(--form-left);
            width: calc(var(--form-col-width) * 2 + var(--form-col-gap));
            font-family: var(--font-serif);
            font-weight: 500;
        }

        .thanks h1 {
            margin: 0 0 18px;
            font-size: 28px;
            font-weight: 500;
            line-height: 1.25;
        }

        .thanks p {
            margin: 0 0 28px;
            font-size: 16px;
            line-height: 1.45;
            color: var(--ink);
        }

        .thanks a {
            color: var(--ink);
            text-decoration: none;
            border-bottom: 1px solid var(--border-soft);
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="site-header__inner">
            <a class="logo" href="../../" aria-label="arch arch home">
                <img src="../../assets/logo.png" alt="arch arch" width="152" height="37">
            </a>
        </div>
    </header>

    <div class="page-viewport">
        <div class="page-canvas">
            <section class="thanks" aria-label="Submission confirmation">
                <h1>Thank you.</h1>
                <p>We received your project brief and will get back to you soon.</p>
                <p><a href="../../">Back to arch arch</a></p>
            </section>
        </div>
    </div>
</body>
</html>
