# /etc/nginx/conf.d/archarch-feishu-submit.conf
# Replace api.archarch.net with your domain or use server IP temporarily.

server {
    listen 80;
    server_name api.archarch.net;

    location /health {
        proxy_pass http://127.0.0.1:8787/health;
    }

    location /api/feishu-submit {
        proxy_pass http://127.0.0.1:8787/api/feishu-submit;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
